spring:
  application:
    name: celestial

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/celestial}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

# ── Backblaze B2 ─────────────────────────────────────────────────
b2:
  key-id:      ${B2_KEY_ID:}
  app-key:     ${B2_APP_KEY:}
  bucket-name: ${B2_BUCKET_NAME:sonic-celestial}
  endpoint:    ${B2_ENDPOINT:https://s3.us-east-005.backblazeb2.com}

# ── BunnyCDN ─────────────────────────────────────────────────────
bunny:
  cdn-base: ${BUNNY_CDN_BASE:https://sonic-celestial.b-cdn.net}
