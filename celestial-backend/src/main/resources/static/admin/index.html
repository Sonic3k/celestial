<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Celestial Admin — Deck Manager</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08090e;--surface:#10121a;--border:#ffffff14;
      --text:#c8d4f0;--muted:#6070a0;
      --accent:#a080ff;--accent2:#60b0ff;
      --green:#50d090;--red:#f06060;--yellow:#f0c060;--r:10px;
    }
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}

    header{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#0d0f1a,#08090e)}
    header h1{font-size:17px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    #apiStatus{font-size:11px;color:var(--muted);margin-left:auto}
    #apiInput{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 10px;font-size:12px;width:260px;outline:none}
    #apiInput:focus{border-color:var(--accent)}

    .layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 57px)}
    .sidebar{border-right:1px solid var(--border);padding:20px 12px;background:var(--surface)}
    .sidebar-title{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;padding:0 6px}
    .deck-item{padding:9px 10px;border-radius:var(--r);margin-bottom:5px;cursor:pointer;border:1px solid transparent;transition:all .15s}
    .deck-item:hover{background:#ffffff08;border-color:var(--border)}
    .deck-item.active{background:#a080ff18;border-color:var(--accent)}
    .deck-item .name{font-weight:500;font-size:13px}
    .deck-item .meta{font-size:11px;color:var(--muted);margin-top:2px}
    .badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:700;margin-left:5px}
    .badge-full{background:#50d09022;color:var(--green)}
    .badge-partial{background:#f0c06022;color:var(--yellow)}
    .badge-empty{background:#f0606018;color:var(--red)}
    .pbar{height:3px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden}
    .pfill{height:100%;background:linear-gradient(to right,var(--accent),var(--accent2));transition:width .4s}

    .main{padding:28px 32px;max-width:900px}
    .main-title{font-size:20px;font-weight:600;margin-bottom:4px}
    .main-sub{color:var(--muted);font-size:12px;margin-bottom:24px}

    .btn{padding:7px 16px;border-radius:7px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;background:transparent;color:var(--text)}
    .btn:hover{background:#ffffff0a;border-color:#ffffff22}
    .btn-primary{background:#a080ff22;border-color:var(--accent);color:var(--accent)}
    .btn-primary:hover{background:#a080ff33}
    .btn-green{background:#50d09022;border-color:var(--green);color:var(--green)}
    .btn-green:hover{background:#50d09033}
    .btn-danger{background:#f0606014;border-color:var(--red);color:var(--red)}
    .btn-danger:hover{background:#f0606022}
    .btn:disabled{opacity:.4;cursor:not-allowed}

    .stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;min-width:110px}
    .stat .val{font-size:22px;font-weight:700;color:var(--accent)}
    .stat .lbl{font-size:10px;color:var(--muted);margin-top:2px}

    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px}

    /* Crawl modal */
    .overlay{position:fixed;inset:0;background:#00000099;backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:480px;width:100%;position:relative}
    .modal h2{font-size:16px;font-weight:600;margin-bottom:6px}
    .modal .sub{font-size:12px;color:var(--muted);margin-bottom:24px}
    .modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
    .modal-close:hover{color:var(--text)}
    .deck-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .deck-option{border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;background:transparent}
    .deck-option:hover{border-color:var(--accent);background:#a080ff0a}
    .deck-option.selected{border-color:var(--accent);background:#a080ff18}
    .deck-option .do-name{font-weight:500;font-size:13px}
    .deck-option .do-meta{font-size:11px;color:var(--muted);margin-top:3px}
    .options-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
    .checkbox-label{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer}
    .checkbox-label input{accent-color:var(--accent)}

    /* Job log */
    .job-card{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
    .job-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#ffffff04}
    .job-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
    .s-pending{background:#f0c06022;color:var(--yellow)}
    .s-running{background:#60b0ff22;color:var(--accent2)}
    .s-done{background:#50d09022;color:var(--green)}
    .s-error{background:#f0606022;color:var(--red)}
    .job-info{flex:1;min-width:0}
    .job-deck{font-weight:500;font-size:13px}
    .job-meta{font-size:11px;color:var(--muted)}
    .job-log{font-family:monospace;font-size:11px;color:#8090b0;white-space:pre-wrap;padding:12px 14px;background:#000000aa;max-height:240px;overflow-y:auto;border-top:1px solid var(--border);display:none}
    .job-log.open{display:block}
    .log-toggle{font-size:11px;color:var(--accent);cursor:pointer;padding:4px 14px;border-top:1px solid var(--border);display:block;background:none;border-left:none;border-right:none;border-bottom:none;text-align:left;width:100%}
    .log-toggle:hover{background:#a080ff08}

    .tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--border)}
    .tab{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent;color:var(--muted);margin-bottom:-1px;background:none;border-left:none;border-right:none;border-top:none}
    .tab:hover{color:var(--text)}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    .empty{padding:60px 20px;text-align:center;color:var(--muted)}
    .empty .icon{font-size:36px;margin-bottom:10px}

    .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    #toast{position:fixed;bottom:20px;right:20px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;background:var(--surface);border:1px solid var(--border);display:none;z-index:999}
    #toast.show{display:block}
    #toast.ok{border-color:var(--green);color:var(--green)}
    #toast.err{border-color:var(--red);color:var(--red)}
  </style>
</head>
<body>

<header>
  <div>✦</div>
  <h1>Celestial Admin</h1>
  <span style="color:var(--muted);font-size:12px">Deck Manager</span>
  <span id="apiStatus">Connecting...</span>
  <input id="apiInput" type="text" placeholder="API URL" />
  <button class="btn btn-primary" onclick="connect()">Connect</button>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Seeded Decks</div>
    <div id="deckList"><div style="color:var(--muted);font-size:12px;padding:6px">Loading...</div></div>
    <div style="margin-top:14px">
      <button class="btn btn-green" style="width:100%" onclick="openCrawlModal()">
        ＋ Crawl New Deck
      </button>
    </div>
  </div>

  <div class="main" id="mainPanel">
    <div class="empty"><div class="icon">✴</div>Select a deck or crawl a new one.</div>
  </div>
</div>

<!-- Crawl Modal -->
<div class="overlay" id="crawlModal" style="display:none" onclick="closeCrawlModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeCrawlModal()">✕</button>
    <h2>Crawl a Deck</h2>
    <div class="sub">Backend will fetch data, download images, and seed the database automatically.</div>

    <div class="sidebar-title" style="margin-bottom:10px">Select Deck</div>
    <div class="deck-grid" id="catalogueGrid">Loading...</div>

    <div class="options-row">
      <label class="checkbox-label">
        <input type="checkbox" id="chkSkipImages" />
        Skip images <span style="font-size:10px">(faster, data only)</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chkUpdate" />
        Replace if exists
      </label>
    </div>

    <button class="btn btn-green" id="startCrawlBtn" onclick="startCrawl()" style="width:100%">
      ▶ Start Crawl
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
let API = localStorage.getItem('celestial_api') || ''
let selectedDeck = null
let selectedSlug = null
let pollTimer    = null
let allDecks     = []

document.getElementById('apiInput').value = API

// ── Init ─────────────────────────────────────────────────────────
async function connect() {
  API = document.getElementById('apiInput').value.trim().replace(/\/$/, '')
  localStorage.setItem('celestial_api', API)
  await loadDecks()
  renderMain()
}

async function init() {
  if (!API) {
    document.getElementById('apiStatus').textContent = '● Not connected'
    return
  }
  await loadDecks()
}

// ── HTTP ──────────────────────────────────────────────────────────
async function get(path) {
  const r = await fetch(API + path)
  const j = await r.json()
  if (!j.success) throw new Error(j.error || 'API error')
  return j.data
}
async function post(path, body) {
  const r = await fetch(API + path, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  })
  const j = await r.json()
  if (!j.success) throw new Error(j.error || 'API error')
  return j.data
}
async function del(path) {
  const r = await fetch(API + path, { method:'DELETE' })
  return r.ok
}

// ── Decks ─────────────────────────────────────────────────────────
async function loadDecks() {
  const st = document.getElementById('apiStatus')
  try {
    allDecks = await get('/api/admin/decks')
    st.textContent = '● Connected'
    st.style.color = 'var(--green)'
    renderSidebar()
  } catch(e) {
    st.textContent = '● Disconnected'
    st.style.color = 'var(--red)'
    document.getElementById('deckList').innerHTML =
      `<div style="color:var(--muted);font-size:12px;padding:6px">Cannot connect to ${API || '(no URL set)'}</div>`
  }
}

function renderSidebar() {
  const el = document.getElementById('deckList')
  if (!allDecks.length) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:6px">No decks yet. Crawl one!</div>`
    return
  }
  el.innerHTML = allDecks.map(d => {
    const pct = Math.round(((d.seededCards||0)/Math.max(d.cardCount,1))*100)
    const badgeCls = d.seededCards === 0 ? 'badge-empty' : pct < 100 ? 'badge-partial' : 'badge-full'
    const badgeTxt = d.seededCards === 0 ? 'Empty' : pct < 100 ? pct+'%' : 'Full'
    const act = selectedDeck?.id === d.id ? 'active' : ''
    return `<div class="deck-item ${act}" onclick="selectDeck(${d.id})">
      <div class="name">${d.nameEn}<span class="badge ${badgeCls}">${badgeTxt}</span></div>
      <div class="meta">${d.seededCards||0}/${d.cardCount} cards</div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>`
  }).join('')
}

function selectDeck(id) {
  selectedDeck = allDecks.find(d => d.id === id)
  renderSidebar()
  renderDeckPanel()
}

function renderMain() {
  if (!selectedDeck) {
    document.getElementById('mainPanel').innerHTML =
      `<div class="empty"><div class="icon">✴</div>Select a deck or crawl a new one.</div>`
  } else {
    renderDeckPanel()
  }
}

function renderDeckPanel() {
  const d = selectedDeck
  const pct = Math.round(((d.seededCards||0)/Math.max(d.cardCount,1))*100)
  document.getElementById('mainPanel').innerHTML = `
    <div class="tabs">
      <button class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</button>
      <button class="tab" id="tab-jobs" onclick="switchTab('jobs')">Crawl Jobs</button>
    </div>

    <div id="panel-overview">
      <div class="main-title">${d.nameEn}</div>
      <div class="main-sub">${d.nameVi} · ${d.style||'classic'} · ID: ${d.id}</div>

      <div class="stats">
        <div class="stat"><div class="val">${d.seededCards||0}</div><div class="lbl">Cards Seeded</div></div>
        <div class="stat"><div class="val">${d.cardCount - (d.seededCards||0)}</div><div class="lbl">Missing</div></div>
        <div class="stat"><div class="val">${pct}%</div><div class="lbl">Complete</div></div>
      </div>

      <div class="toolbar">
        <button class="btn btn-green" onclick="quickRecrawl(${d.id}, '${d.nameEn}')">↺ Re-crawl this deck</button>
        <button class="btn btn-danger" onclick="confirmDelete(${d.id}, '${d.nameEn}')">Delete</button>
      </div>

      ${pct===0 ? `<div class="empty" style="padding:30px 0">
          <div class="icon">🃏</div>No cards seeded yet.<br>
          <button class="btn btn-green" style="margin-top:12px" onclick="openCrawlModal()">▶ Crawl now</button>
        </div>` : ''}
    </div>

    <div id="panel-jobs" style="display:none">
      <div id="jobsList">Loading...</div>
    </div>
  `
}

function switchTab(tab) {
  document.getElementById('panel-overview').style.display = tab==='overview' ? '' : 'none'
  document.getElementById('panel-jobs').style.display     = tab==='jobs'     ? '' : 'none'
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('tab-'+tab).classList.add('active')
  if (tab === 'jobs') loadJobsPanel()
}

async function loadJobsPanel() {
  const el = document.getElementById('jobsList')
  if (!el) return
  try {
    const jobs = await get('/api/admin/jobs')
    if (!jobs.length) { el.innerHTML = `<div class="empty"><div class="icon">📋</div>No jobs yet.</div>`; return }
    el.innerHTML = jobs.map(jobHtml).join('')
  } catch(e) { el.innerHTML = `<div style="color:var(--muted)">Could not load jobs.</div>` }
}

function jobHtml(j) {
  const sCls = {PENDING:'s-pending',RUNNING:'s-running',DONE:'s-done',ERROR:'s-error'}[j.status]||'s-pending'
  const created = new Date(j.createdAt).toLocaleString()
  const extra   = j.seededCards > 0 ? ` · ${j.seededCards} cards seeded` : ''
  const running = j.status === 'RUNNING' ? `<span class="spinner" style="margin-left:6px"></span>` : ''
  return `<div class="job-card">
    <div class="job-header">
      <div class="job-status ${sCls}">${j.status}</div>${running}
      <div class="job-info">
        <div class="job-deck">${j.deckSlug}</div>
        <div class="job-meta">${created}${extra}</div>
        ${j.errorMsg ? `<div style="color:var(--red);font-size:11px;margin-top:3px">${escHtml(j.errorMsg)}</div>` : ''}
      </div>
    </div>
    ${j.log ? `<button class="log-toggle" onclick="toggleLog(this)">▶ Show log</button>
               <div class="job-log"><code>${escHtml(j.log.trim())}</code></div>` : ''}
  </div>`
}

function toggleLog(btn) {
  const log = btn.nextElementSibling
  log.classList.toggle('open')
  btn.textContent = log.classList.contains('open') ? '▼ Hide log' : '▶ Show log'
}

// ── Crawl Modal ───────────────────────────────────────────────────
async function openCrawlModal() {
  document.getElementById('crawlModal').style.display = 'flex'
  selectedSlug = null
  document.getElementById('catalogueGrid').innerHTML = 'Loading...'
  try {
    const catalogue = await get('/api/admin/decks/catalogue')
    document.getElementById('catalogueGrid').innerHTML = catalogue.map(d => `
      <div class="deck-option" onclick="selectSlug('${d.slug}', this)">
        <div class="do-name">${d.nameEn}</div>
        <div class="do-meta">${d.cardCount} cards · ${d.style}</div>
      </div>`).join('')
    if (catalogue.length === 1) {
      selectedSlug = catalogue[0].slug
      document.querySelector('.deck-option').classList.add('selected')
    }
  } catch(e) {
    document.getElementById('catalogueGrid').innerHTML = `<div style="color:var(--red)">Failed to load: ${e.message}</div>`
  }
}

function closeCrawlModal() {
  document.getElementById('crawlModal').style.display = 'none'
}

function selectSlug(slug, el) {
  selectedSlug = slug
  document.querySelectorAll('.deck-option').forEach(e => e.classList.remove('selected'))
  el.classList.add('selected')
}

async function startCrawl() {
  if (!selectedSlug) { toast('Select a deck first', 'err'); return }
  const skipImages = document.getElementById('chkSkipImages').checked
  const update     = document.getElementById('chkUpdate').checked
  const btn        = document.getElementById('startCrawlBtn')

  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Starting...'

  try {
    const job = await post('/api/admin/crawl/start', { deckSlug: selectedSlug, skipImages, update })
    closeCrawlModal()
    toast('Crawl started! Job #' + job.id, 'ok')
    await loadDecks()
    startPolling(job.id)
    // Show jobs tab
    if (selectedDeck) { switchTab('jobs') }
    else { showJobsView(job) }
  } catch(e) {
    toast('Error: ' + e.message, 'err')
    btn.disabled = false
    btn.innerHTML = '▶ Start Crawl'
  }
}

async function quickRecrawl(deckId, nameEn) {
  const update = confirm(`Re-crawl "${nameEn}"?\nThis will replace all existing cards.`)
  if (!update) return

  // Find slug from catalogue
  try {
    const catalogue = await get('/api/admin/decks/catalogue')
    const match = catalogue.find(d => d.nameEn === nameEn)
    if (!match) { toast('Deck not in crawl catalogue', 'err'); return }

    const job = await post('/api/admin/crawl/start', { deckSlug: match.slug, skipImages: false, update: true })
    toast('Re-crawl started! Job #' + job.id, 'ok')
    startPolling(job.id)
    switchTab('jobs')
  } catch(e) {
    toast('Error: ' + e.message, 'err')
  }
}

// ── Polling ───────────────────────────────────────────────────────
function startPolling(jobId) {
  if (pollTimer) clearInterval(pollTimer)
  pollTimer = setInterval(async () => {
    try {
      const job = await get('/api/admin/jobs/' + jobId)
      // Refresh sidebar progress
      await loadDecks()
      // Refresh jobs panel if visible
      const jobsPanel = document.getElementById('jobsList')
      if (jobsPanel) loadJobsPanel()

      if (job.status === 'DONE' || job.status === 'ERROR') {
        clearInterval(pollTimer)
        pollTimer = null
        if (job.status === 'DONE') {
          toast('✓ Crawl complete — ' + job.seededCards + ' cards seeded!', 'ok')
        } else {
          toast('✗ Crawl failed: ' + (job.errorMsg || 'Unknown error'), 'err')
        }
        await loadDecks()
      }
    } catch(e) { /* ignore poll errors */ }
  }, 3000)
}

function showJobsView(job) {
  const main = document.getElementById('mainPanel')
  main.innerHTML = `
    <div class="main-title">Crawl in Progress</div>
    <div class="main-sub">Job #${job.id} · ${job.deckSlug}</div>
    <div id="liveJob">${jobHtml(job)}</div>`
  startPolling(job.id)
}

// ── Deck Actions ──────────────────────────────────────────────────
async function confirmDelete(id, name) {
  if (!confirm(`Delete deck "${name}" and ALL cards?\nCannot be undone.`)) return
  try {
    await del('/api/admin/decks/' + id)
    toast(`Deck "${name}" deleted`, 'ok')
    selectedDeck = null
    await loadDecks()
    renderMain()
  } catch(e) { toast('Delete failed: ' + e.message, 'err') }
}

// ── Utils ─────────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = `show ${type}`
  setTimeout(() => el.className='', 3000)
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

// ── Boot ──────────────────────────────────────────────────────────
init()
setInterval(loadDecks, 15000)
</script>
</body>
</html>
